trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'

steps:
- script: dotnet build --configuration $(buildConfiguration)
  workingDirectory: 'src'
  displayName: 'Compile ASP.NET Core Web API: $(buildConfiguration)'

- script: |
    echo "Downloading Terraform..."
    curl -O https://releases.hashicorp.com/terraform/1.8.4/terraform_1.8.4_linux_amd64.zip
    unzip terraform_1.8.4_linux_amd64.zip
    sudo mv terraform /usr/local/bin/
    terraform -version
  displayName: 'Install Terraform CLI'
  
- task: AzureCLI@2
  displayName: 'Provision Infrastructure via Terraform'
  env:
    TF_TOKEN_app_terraform_io: $(TF_API_TOKEN)
  inputs:
    azureSubscription: 'mrpapi-azure-connection' 
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      echo "Initializing Terraform..."
      cd infrastructure
      terraform init

      echo "Check Terraform Format..."
      terraform fmt -check

      echo "Planning Terraform deployment..."
      terraform plan -out=tfplan

      echo "Applying Terraform deployment..."
      terraform apply -auto-approve tfplan

- task: AzureCLI@2
  displayName: 'Build and Push API Image to ACR'
  inputs:
    azureSubscription: 'mrpapi-azure-connection' 
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      ACR_NAME="acrmrpapidevsanorth"
      IMAGE_NAME="mrpapi-backend"
      TAG="$(Build.BuildId)"
      
      echo "Logging into Azure Container Registry..."
      az acr login --name $ACR_NAME
      
      echo "Building the Docker image..."
      cd src
      
      docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:$TAG .
      
      docker tag $ACR_NAME.azurecr.io/$IMAGE_NAME:$TAG $ACR_NAME.azurecr.io/$IMAGE_NAME:latest
      
      echo "Pushing the image to ACR..."
      docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:$TAG
      docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest
